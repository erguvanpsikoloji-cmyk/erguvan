<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100">
  <!-- Styles -->
  <style>
    .text-title { font-family: 'Times New Roman', serif; font-weight: bold; font-size: 38px; fill: #1B263B; }
    .text-sub { font-family: sans-serif; font-size: 14px; fill: #1B263B; letter-spacing: 0.5px; }
    .profile { fill: none; stroke: #1B263B; stroke-width: 2; stroke-linecap: round; }
    .branch { fill: none; stroke: #5D4037; stroke-width: 1.5; }
    .flower { fill: #9C27B0; opacity: 0.8; }
    .flower-light { fill: #E040FB; opacity: 0.8; }
  </style>

  <!-- Face Profile (Stylized Left) -->
  <path class="profile" d="M30,90 Q20,80 20,50 Q20,10 50,10 Q75,10 80,30 Q82,35 80,40 Q75,45 78,50 Q80,55 75,60 Q70,65 75,70 Q80,75 80,90" />

  <!-- Branches inside head -->
  <path class="branch" d="M30,90 C35,70 40,60 60,40" />
  <path class="branch" d="M40,70 C50,65 65,55 70,30" />
  
  <!-- Erguvan Flowers -->
  <circle class="flower" cx="60" cy="40" r="3" />
  <circle class="flower-light" cx="55" cy="43" r="2.5" />
  <circle class="flower" cx="65" cy="35" r="3" />
  <circle class="flower-light" cx="70" cy="30" r="2" />
  <circle class="flower" cx="50" cy="65" r="3" />
  <circle class="flower-light" cx="45" cy="60" r="2.5" />
  <circle class="flower" cx="35" cy="75" r="2" />
  <circle class="flower" cx="25" cy="50" r="2.5" />
  <circle class="flower-light" cx="30" cy="45" r="2" />

  <!-- Text -->
  <text x="100" y="55" class="text-title">Erguvan Psikoloji</text>
  <text x="102" y="80" class="text-sub">Uzman Klinik Psikolog Desteği</text>
</svg>
