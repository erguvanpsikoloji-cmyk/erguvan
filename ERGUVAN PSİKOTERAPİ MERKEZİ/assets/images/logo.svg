<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Erguvan Psikoloji - Vector Logo Design -->
  <defs>
    <linearGradient id="erguvanGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B3D48;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A64069;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Stylized Human Profile / Tree Trunk -->
  <path d="M70 160 C75 140 85 130 85 110 C85 90 75 80 80 60 C85 40 100 30 115 35 C130 40 140 55 140 75 C140 95 130 110 130 130 C130 150 140 160 145 170" fill="none" stroke="#1D2D50" stroke-width="5" stroke-linecap="round" opacity="0.9"/>
  
  <!-- Erguvan Flowers / Brain Concept -->
  <circle cx="100" cy="70" r="45" fill="url(#erguvanGradient)" opacity="0.15" />
  
  <!-- Petals forming a brain-like tree crown -->
  <ellipse cx="90" cy="55" rx="12" ry="18" fill="url(#erguvanGradient)" transform="rotate(-30 90 55)" />
  <ellipse cx="115" cy="50" rx="14" ry="20" fill="url(#erguvanGradient)" transform="rotate(20 115 50)" />
  <ellipse cx="130" cy="75" rx="12" ry="18" fill="url(#erguvanGradient)" transform="rotate(45 130 75)" />
  <ellipse cx="120" cy="100" rx="10" ry="15" fill="url(#erguvanGradient)" transform="rotate(80 120 100)" />
  <ellipse cx="85" cy="90" rx="12" ry="18" fill="url(#erguvanGradient)" transform="rotate(-60 85 90)" />
  <ellipse cx="75" cy="70" rx="10" ry="15" fill="url(#erguvanGradient)" transform="rotate(-15 75 70)" />
  <ellipse cx="105" cy="80" rx="15" ry="22" fill="url(#erguvanGradient)" opacity="0.6"/>
  
  <!-- Center points -->
  <circle cx="105" cy="75" r="3" fill="#1D2D50" opacity="0.5"/>
</svg>
